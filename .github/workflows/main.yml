name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Linter
        run: |
          find . -name "*.py" -exec flake8 --ignore=E117,E128,E131,E225,E231,E261,E265,E275,E302,E303,E305,E501,E712,E722,F401,F811,F841,W291,W292,W293,W391 {} +
          echo "Linted all the python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3

      - name: Install JSHint
        run: npm install jshint --global

      - name: Run Linter
        run: |
          find ./server/database -name "*.js" -exec jshint --extra-ext=js --config=<(echo '{"esversion": 8, "sub": true}') {} +
          echo "Linted all the js files successfully"
